{{ define "content" }}
<h1>{{ t "books_title" }}</h1>
<div class="grid">
    {{ range .Books }}
        <article class="card">
            <h2><a href="/books/{{ .Slug }}">{{ .Title }}</a></h2>
            <p>{{ .Description }}</p>
        </article>
    {{ end }}
</div>
{{ end }}
{{ template "base" . }}
