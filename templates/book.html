{{ define "content" }}
<h1>{{ .Book.Title }}</h1>
<p>{{ .Book.Description }}</p>
<div class="grid">
    {{ range .Chapters }}
        <article class="card chapter">
            <h2>{{ .Title }}</h2>
            <p>By {{ .Author }}</p>
            <p>Path: {{ .PathLabel }}</p>
            <p>{{ .Excerpt }}</p>
            <p>Likes: {{ .LikeCount }}</p>
            <a class="btn" href="/books/{{ $.Book.Slug }}/{{ .Slug }}">Read</a>
        </article>
    {{ else }}
        <p>No published chapters yet.</p>
    {{ end }}
</div>
{{ end }}
{{ template "base" . }}
