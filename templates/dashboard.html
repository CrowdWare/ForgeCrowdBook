{{ define "content" }}
<h1>{{ t "dashboard_welcome" }}, {{ .User.DisplayName }}</h1>
<div class="grid">
    {{ range .Books }}
        <article class="card">
            <h2>{{ .Title }}</h2>
            <p>{{ .Description }}</p>
            <form method="POST" action="/dashboard/book/{{ .ID }}/select">
                <input type="hidden" name="_csrf" value="{{ $.CSRFToken }}">
                <button type="submit">
                    {{ if and $.ActiveBook (eq $.ActiveBook.ID .ID) }}{{ t "dashboard_selected" }}{{ else }}{{ t "dashboard_select" }}{{ end }}
                </button>
            </form>
        </article>
    {{ end }}
</div>
{{ if .ActiveBook }}
    <p><a href="/dashboard/chapters">{{ t "chapters_title" }}</a></p>
{{ end }}
{{ end }}
{{ template "base" . }}
