{{ define "content" }}
<h1>{{ t "nav_login" }}</h1>
<form method="POST" action="/login" class="stack">
    <input type="hidden" name="_csrf" value="{{ .CSRFToken }}">
    <label>{{ t "label_email" }}
        <input type="email" name="email" required>
    </label>
    <button type="submit">{{ t "login_send_link" }}</button>
</form>
{{ end }}
{{ template "base" . }}
